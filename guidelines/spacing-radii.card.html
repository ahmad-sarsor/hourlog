<!-- @dsCard group="Spacing" viewport="700x170" name="Corner Radii" subtitle="From 7px checkbox to 18px modal — soft but never pill-round on panels" -->
<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface); }
  .row { display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap; }
  .r { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .box { width: 74px; height: 60px; background: var(--accent-soft); border: 1.5px solid var(--accent); }
  .name { font-size: 11.5px; color: var(--ink-2); font-weight: 600; }
  .val { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="r"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="name">xs · checkbox</span><span class="val">7px</span></div>
    <div class="r"><div class="box" style="border-radius:var(--radius-md)"></div><span class="name">md · input</span><span class="val">9px</span></div>
    <div class="r"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="name">lg · button</span><span class="val">10px</span></div>
    <div class="r"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="name">xl · brand mark</span><span class="val">12px</span></div>
    <div class="r"><div class="box" style="border-radius:var(--radius-2xl)"></div><span class="name">2xl · card</span><span class="val">16px</span></div>
    <div class="r"><div class="box" style="border-radius:var(--radius-3xl)"></div><span class="name">3xl · modal</span><span class="val">18px</span></div>
  </div>
</body>
</html>
