<!-- @dsCard group="Colors" viewport="700x180" name="Gold, Teal & Danger" subtitle="Document accents (gold, teal) and the caution / weekend reds" -->
<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--page-bg); }
  .swrow { display: flex; gap: 12px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 86px; border-radius: var(--radius-lg); border: 1px solid rgba(16,32,43,.06); display: grid; place-items: center; }
  .on { color: #fff; font-weight: 700; font-size: 13px; }
  .name { font-size: 12px; font-weight: 600; color: var(--ink); }
  .val { font-size: 11.5px; color: var(--muted); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="swrow">
    <div class="sw"><div class="chip" style="background:var(--gold)"><span class="on">gold</span></div><span class="name">gold</span><span class="val">#977423</span></div>
    <div class="sw"><div class="chip" style="background:var(--gold-soft)"></div><span class="name">gold-soft</span><span class="val">#F4EEDD</span></div>
    <div class="sw"><div class="chip" style="background:var(--teal)"><span class="on">teal</span></div><span class="name">teal</span><span class="val">#6E9B94</span></div>
    <div class="sw"><div class="chip" style="background:var(--danger)"><span class="on">danger</span></div><span class="name">danger</span><span class="val">#B54034</span></div>
    <div class="sw"><div class="chip" style="background:var(--weekend)"><span class="on">שבת</span></div><span class="name">weekend</span><span class="val">#C0392B</span></div>
  </div>
</body>
</html>
