<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing Scale" subtitle="An organic scale (5–22px), kept verbatim — not snapped to a grid" -->
<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface); }
  .rows { display: flex; flex-direction: column; gap: 10px; }
  .r { display: flex; align-items: center; gap: 14px; }
  .bar { height: 16px; background: var(--accent-soft); border-radius: 4px; }
  .bar > i { display: block; height: 100%; background: var(--accent); border-radius: 4px; }
  .lbl { font-size: 12px; color: var(--ink-2); font-weight: 600; min-width: 92px; }
  .val { font-size: 11.5px; color: var(--muted); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="rows">
    <div class="r"><span class="lbl">space-2xs</span><div class="bar" style="width:200px"><i style="width:5px"></i></div><span class="val">5px</span></div>
    <div class="r"><span class="lbl">space-sm</span><div class="bar" style="width:200px"><i style="width:9px"></i></div><span class="val">9px</span></div>
    <div class="r"><span class="lbl">space-md</span><div class="bar" style="width:200px"><i style="width:11px"></i></div><span class="val">11px</span></div>
    <div class="r"><span class="lbl">space-gap</span><div class="bar" style="width:200px"><i style="width:14px"></i></div><span class="val">14px</span></div>
    <div class="r"><span class="lbl">space-lg</span><div class="bar" style="width:200px"><i style="width:16px"></i></div><span class="val">16px · grid gap</span></div>
    <div class="r"><span class="lbl">space-card</span><div class="bar" style="width:200px"><i style="width:18px"></i></div><span class="val">18px · card padding</span></div>
    <div class="r"><span class="lbl">space-xl</span><div class="bar" style="width:200px"><i style="width:22px"></i></div><span class="val">22px · modal padding</span></div>
  </div>
</body>
</html>
