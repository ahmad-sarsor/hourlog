<!-- @dsCard group="Brand" viewport="700x200" name="Iconography — Unicode Glyphs" subtitle="No icon font. Meaning is carried by a small, fixed set of unicode symbols" -->
<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface); }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .g { display: flex; flex-direction: column; gap: 6px; align-items: center; text-align: center; }
  .glyph { width: 100%; height: 52px; border: 1px solid var(--line); border-radius: var(--radius-md);
           display: grid; place-items: center; font-size: 22px; color: var(--ink); background: #fff; }
  .cap { font-size: 10.5px; color: var(--muted); font-weight: 600; }
</style>
</head>
<body>
  <div class="grid">
    <div class="g"><div class="glyph">₪</div><span class="cap">currency / mark</span></div>
    <div class="g"><div class="glyph">⚙</div><span class="cap">settings</span></div>
    <div class="g"><div class="glyph">＋</div><span class="cap">add</span></div>
    <div class="g"><div class="glyph" style="color:var(--accent)">✓</div><span class="cap">reported</span></div>
    <div class="g"><div class="glyph">✎</div><span class="cap">edit</span></div>
    <div class="g"><div class="glyph" style="color:var(--danger)">✕</div><span class="cap">delete</span></div>
    <div class="g"><div class="glyph">⏱</div><span class="cap">hours</span></div>
    <div class="g"><div class="glyph">↺</div><span class="cap">undo</span></div>
    <div class="g"><div class="glyph">▼</div><span class="cap">expand</span></div>
    <div class="g"><div class="glyph">▲</div><span class="cap">collapse</span></div>
    <div class="g"><div class="glyph">–</div><span class="cap">em-dash empty</span></div>
    <div class="g"><div class="glyph">%</div><span class="cap">VAT</span></div>
  </div>
</body>
</html>
