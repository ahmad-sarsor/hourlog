<!-- @dsCard group="Spacing" viewport="700x200" name="Elevation & Focus" subtitle="Ink-tinted shadows give cards their floating-paper calm" -->
<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 30px 24px; background: var(--page-bg); }
  .row { display: flex; gap: 26px; align-items: center; flex-wrap: wrap; }
  .r { display: flex; flex-direction: column; gap: 12px; align-items: center; }
  .box { width: 150px; height: 74px; background: #fff; border: 1px solid var(--line); border-radius: var(--radius-2xl);
         display: grid; place-items: center; font-size: 12px; font-weight: 600; color: var(--ink-2); }
  .box.card { box-shadow: var(--shadow-card); }
  .box.modal { box-shadow: var(--shadow-modal); }
  .box.focus { box-shadow: var(--shadow-focus); border-color: var(--accent); }
  .name { font-size: 11.5px; color: var(--muted); font-weight: 600; }
</style>
</head>
<body>
  <div class="row">
    <div class="r"><div class="box card">shadow-card</div><span class="name">cards · panels</span></div>
    <div class="r"><div class="box modal">shadow-modal</div><span class="name">dialogs</span></div>
    <div class="r"><div class="box focus">focus ring</div><span class="name">3px accent-soft</span></div>
  </div>
</body>
</html>
