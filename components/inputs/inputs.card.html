<!-- @dsCard group="Components" viewport="700x300" name="Inputs & Fields" subtitle="Text/date input, select, 24h time picker, reported toggle" -->
<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--page-bg); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .inline { display: flex; gap: 12px; align-items: flex-end; }
  .lbl { font-size: var(--fs-label); font-weight: var(--fw-semibold); color: var(--ink-2);
         display: flex; flex-direction: column; gap: 5px; }
  .chkrow { display: flex; align-items: center; gap: 10px; font-size: var(--fs-table);
            font-weight: var(--fw-semibold); color: var(--ink-2); }
</style>
</head>
<body>
<div id="card-root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" data-presets="react">
const { Input, Select, TimeField, Checkbox } = window.HourLogILDesignSystem_d9be1f;
function Demo() {
  const [start, setStart] = React.useState('09:00');
  const [end, setEnd] = React.useState('17:30');
  const [rep, setRep] = React.useState(true);
  return (
    <div className="grid">
      <div className="stack">
        <Input label="לקוח" defaultValue="לקוח לדוגמה" />
        <Input label="תאריך" type="date" defaultValue="2026-06-24" />
        <Select label="חודש" options={['כל החודשים', 'יוני 2026', 'מאי 2026']} />
      </div>
      <div className="stack">
        <div className="inline">
          <label className="lbl">משעה<TimeField value={start} onChange={setStart} /></label>
          <label className="lbl">עד שעה<TimeField value={end} onChange={setEnd} /></label>
        </div>
        <Input label="תעריף/שעה (ללא מע&quot;מ)" type="number" defaultValue="260"
               note='התעריף מוזן ללא מע"מ — המע"מ מתווסף אוטומטית.' />
        <div className="chkrow">
          <Checkbox checked={rep} onChange={setRep} title="סמן כדווח" />
          <span>דווח למנהל</span>
          <Checkbox checked={false} onChange={() => {}} title="סמן כדווח" />
          <span>טרם דווח</span>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('card-root')).render(<Demo />);
</script>
</body>
</html>
